
name: first-workflow

on:
  # manually trigger the workflow
  workflow_dispatch:


jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: single shell command
        run: echo "Hello World from Ashish"

      - name: multiple shell commands
        run: |
          echo "Hello World"
          echo "Welcome to GitHub Actions - your CICD partner"
          echo "This is a multi-line command"

  
  second-job:
    needs: first-job
    runs-on: windows-latest
    steps:
      - name: Run Windows command
        run: echo "Hello from Windows by Microsoft"

      - name: multiple windows commands
        run: |
          echo "Hello World"
          echo "Welcome to Github Actions on Windows machine"
