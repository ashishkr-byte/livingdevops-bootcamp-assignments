
# including image scanning in the deploy workflow

name: Image Build,Scan and App Deploy to ECS

on:
  workflow_dispatch:


env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: jan26-bootcamp-student-portal
  IMAGE_TAG: ${{ github.sha }}
  app_path: week6/app/
  container_name: student-portal
  service: jan26-bootcamp-student-portal-service
  cluster: jan26-bootcamp-student-portal
  task-def-family: student-portal




jobs:
  
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v5

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: build, tag and push image to ECR
        id: build-image
        working-directory: ${{ env.app_path }}
        run: |

          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

          # Build a docker image
          docker build -t $IMAGE_URI .
      
          # Push image to ECR
          # docker push $IMAGE_URI

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
      

      - name: scanning the image
        uses: aquasecurity/trivy-action@master
        with: 
          image-ref: ${{ steps.build-image.outputs.image }}
          format: 'table'
          exit-code: '1'
          vuln-type: 'os,library'
          Severity: 'CRITICAL'

      - name: push image to ECR repo
        run: |

          docker push ${{ steps.build-image.outputs.image }}
        
      - name: download current task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.task-def-family }} --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json # the output from previous step
          container-name: ${{ env.container_name }}
          image: ${{ steps.build-image.outputs.image }}
          

      # IMPORTANT: You must upload the rendered file as an artifact 
      # because files do not persist between jobs.

      - name: Upload rendered task definition
        uses: actions/upload-artifact@v4
        with:
          name: task-definition
          path: ${{ steps.task-def.outputs.task-definition }}


  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev
    steps:
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition artifact
        uses: actions/download-artifact@v4
        with:
          name: task-definition
      
      - name: Rename task definition
        run: mv *.json task-definition.json


      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
        # Use the file downloaded from the artifact
          task-definition: task-definition.json # the file from the artifact
          service: ${{ env.service }}
          cluster: ${{ env.cluster }}
          wait-for-service-stability: true 
          # the action blocks and polls ECS until the new deployment is healthy. The workflow step only succeeds once ECS confirms the service is stable.
          # if you dont want it to, you can set the value to be false.